{% load static %}
<!doctype html>
<html>
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}My Blog{% endblock title %}</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'heart-favicon.svg' %}">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            type: 'type 2.7s ease-out .8s infinite alternate both',
          },
          keyframes: {
            type: {
              '0%': { transform: 'translateX(0ch)' },
              '5%, 10%': { transform: 'translateX(1ch)' },
              '15%, 20%': { transform: 'translateX(2ch)' },
              '25%, 30%': { transform: 'translateX(4ch)' },
              '35%, 40%': { transform: 'translateX(5ch)' },
              '45%, 50%': { transform: 'translateX(7ch)' },
              '55%, 60%': { transform: 'translateX(8ch)' },
              '65%, 70%': { transform: 'translateX(10ch)' },
              '75%, 80%': { transform: 'translateX(11ch)' },
              '85%, 90%': { transform: 'translateX(12ch)' },
              '95%, 100%': { transform: 'translateX(15ch)' },
            },
          },
        }
      }
    }
  </script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    .flower-overlay {
      pointer-events: none;
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 40;
    }
    .flower-petal {
      position: absolute;
      top: -8vh;
      width: var(--size);
      height: calc(var(--size) * 0.7);
      border-radius: 70% 30% 65% 35%;
      opacity: 0.85;
      background: linear-gradient(135deg, #ffd7ea 0%, #ff99c8 100%);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.35) inset;
      animation: flower-fall var(--dur) linear infinite;
      animation-delay: var(--delay);
    }
    @keyframes flower-fall {
      0% {
        transform: translate3d(0, -10vh, 0) rotate(0deg);
      }
      100% {
        transform: translate3d(var(--drift), 115vh, 0) rotate(540deg);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .flower-overlay {
        display: none;
      }
    }
    .header-slider-shell {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(226, 232, 240, 0.9), transparent 34%),
        linear-gradient(90deg, #f8fafc 0%, #fffbf7 50%, #f8fafc 100%);
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
    }
    .header-slider-shell::before,
    .header-slider-shell::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 72px;
      z-index: 1;
      pointer-events: none;
    }
    .header-slider-shell::before {
      left: 0;
      background: linear-gradient(90deg, rgba(248, 250, 252, 1), rgba(248, 250, 252, 0));
    }
    .header-slider-shell::after {
      right: 0;
      background: linear-gradient(270deg, rgba(248, 250, 252, 1), rgba(248, 250, 252, 0));
    }
    .header-slider-track {
      display: flex;
      width: max-content;
      animation: header-slider-move 28s linear infinite;
    }
    .header-slider-shell:hover .header-slider-track {
      animation-play-state: paused;
    }
    .header-slider-card {
      width: min(86vw, 320px);
      flex: 0 0 auto;
    }
    @keyframes header-slider-move {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(-50%);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .header-slider-track {
        animation: none;
      }
    }
  </style>
  </head>
  <body class="bg-stone-50 text-slate-700">
    <div class="flower-overlay" id="flowerOverlay" aria-hidden="true"></div>
    {% include "navbar.html" %}
    {% include "header_slider.html" %}
    {% block content %}
    {% endblock content %}
    {% include "footer.html" %}
  <!-- <img src='{% static "img/dummy.jpg" %}'/> -->
  <script>
    (function () {
      const overlay = document.getElementById("flowerOverlay");
      if (!overlay || window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;

      const count = window.innerWidth < 768 ? 12 : 20;
      for (let i = 0; i < count; i += 1) {
        const petal = document.createElement("span");
        petal.className = "flower-petal";
        petal.style.left = `${Math.random() * 100}%`;
        petal.style.setProperty("--size", `${8 + Math.random() * 12}px`);
        petal.style.setProperty("--dur", `${8 + Math.random() * 9}s`);
        petal.style.setProperty("--delay", `${-Math.random() * 12}s`);
        petal.style.setProperty("--drift", `${-80 + Math.random() * 160}px`);
        overlay.appendChild(petal);
      }
    })();
  </script>
  </body>
</html>
