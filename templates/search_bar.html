{% extends 'base.html' %}
{% block content %}


<section class="blog bg-gradient-to-b from-rose-50 to-stone-50 text-slate-700 body-font">
    <div class="container px-5 py-24 mx-auto">
      <div class="flex flex-wrap w-full mb-20 flex-col items-center text-center">
        <h1 class="sm:text-3xl text-2xl font-medium title-font mb-2 text-slate-900"> 
          Search Results</h1>
        <p class="text-sm text-slate-500">Browse posts that match your search.</p>
      </div>
      <div class="flex flex-wrap sm:-m-4 -mx-4 -mb-10 -mt-4">
        {% for obj in object_list %}
        <div class="p-4 md:w-1/3 md:mb-0 mb-6 flex flex-col justify-center items-center max-w-sm mx-auto">
          <div class="h-56 w-full rounded-2xl shadow-md bg-cover bg-center" style="background-image: url('{{ obj.thumbnail.url }}')"></div>

          <div class="w-70 -mt-10 overflow-hidden rounded-2xl border border-rose-100 bg-white p-5 shadow-lg shadow-rose-100/40">
            
            <div class="header-content inline-flex ">
              <div class="category-badge m flex-1 m-1 h-4 w-4 rounded-full bg-rose-100">
                <div class="m-1 h-2 w-2 rounded-full bg-rose-400" ></div>
              </div>
              {% for category in obj.categories.all %}
              <div class="category-title flex-1 text-sm"> 
                {{ category.title }}
              </div>
              {% endfor %}
            </div>
              <div class="title-post font-medium text-slate-900">
              {{ obj.title }}
              </div>

              <div class="summary-post text-base text-justify text-slate-600">
                {{ obj.overview }}
              </div>
              
              <div class="mt-3">
              <a href="{% url 'post' obj.slug %}" class="rounded-full bg-rose-50 p-2 text-sm text-rose-600 transition hover:bg-rose-100 ">
                Read more
              </a>
            </div>

          </div>
        </div>
        {% endfor %}
      </div>
    </div>
</section>


{% endblock %}
