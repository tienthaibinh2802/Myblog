{% load markdown_extras %}

{% get_categories as category_list %}
    
    <header class="body-font border-b border-rose-100 bg-white/90 text-slate-600 backdrop-blur-sm">
    <div class="container mx-auto flex flex-wrap items-center p-5 md:flex-row">
      <a class="mb-4 flex title-font items-center font-medium text-slate-900 md:mb-0">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#e11d48" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" width="40" height="40" class="rounded-full bg-rose-50 p-2" viewBox="0 0 24 24">
          <path d="M12 21C12 21 3 13 3 8C3 5 5 3 7 3C8.5 3 10 4 12 6C14 4 15.5 3 17 3C19 3 21 5 21 8C21 13 12 21 12 21Z" fill="none"/>
        </svg>               
        <a href="{% url 'homepage' %}" class="ml-3 text-xl font-semibold tracking-wide text-slate-900">
          My Blog</a>
      </a>
      <nav class="md:mr-auto md:ml-4 flex flex-wrap items-center justify-center text-base md:border-l md:border-rose-100 md:py-1 md:pl-4">
        <a href="{% url 'homepage' %}" class="mr-3 inline-flex items-center rounded-full px-4 py-2 transition hover:bg-rose-50 hover:text-slate-900">
          Home
        </a>
        <a href="{% url 'about' %}" class="mr-3 inline-flex items-center rounded-full px-4 py-2 transition hover:bg-rose-50 hover:text-slate-900">
          About
        </a>
        <a href="{% url 'resource_library' %}" class="mr-3 inline-flex items-center rounded-full px-4 py-2 transition hover:bg-rose-50 hover:text-slate-900">
          Resources
        </a>
          <!-- This example requires Tailwind CSS v2.0+ -->
<div x-data="{ open: false }" class="relative inline-block text-left">
  <div>
    <button @click="open = ! open" type="button" class="inline-flex w-full justify-center rounded-full border border-rose-100 bg-white px-4 py-2 text-sm font-medium text-slate-700 shadow-sm hover:bg-rose-50 focus:outline-none focus:ring-2 focus:ring-rose-200 focus:ring-offset-2 focus:ring-offset-white" id="menu-button" aria-expanded="true" aria-haspopup="true">
      Categories
      <!-- drop-down -->
      <svg class="-mr-1 ml-2 h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
      </svg>
    </button>
  </div>

  <div
    x-show="open"
    x-transition:enter="transition ease-out duration-100"
    x-transition:enter-start="transform opacity-0 scale-95"
    x-transition:enter-end="transform opacity-100 scale-100"
    x-transition:leave="transition ease-in duration-75"
    x-transition:leave-start="transform opacity-100 scale-100"
    x-transition:leave-end="transform opacity-0 scale-95"
    class="origin-top-right absolute right-0 mt-2 w-56 rounded-2xl border border-rose-100 bg-white shadow-lg shadow-rose-100/40 focus:outline-none" role="menu" aria-orientation="vertical" aria-labelledby="menu-button" tabindex="-1">
    <div class="py-1" role="none">
      <!-- Active: "bg-gray-100 text-gray-900", Not Active: "text-gray-700" -->
      {% for category in category_list %}
          <a href="{% url 'postlist' category.slug %}" class="block rounded-xl px-4 py-2 text-sm text-slate-700 hover:bg-rose-50" role="menuitem" tabindex="-1" id="menu-item-0">
          {{ category.title }}
          </a>
      {% endfor %}
        <a href="{% url 'allposts' %}" type="submit" class="block w-full rounded-xl px-4 py-2 text-left text-sm text-slate-700 hover:bg-rose-50" role="menuitem" tabindex="-1" id="menu-item-3">
        All posts</a> 
    </div>
  </div>
</div>

      </nav>
      <!-- searchbar -->
      <form action ="{% url 'search' %}" class ="search-form"> 
        <div class="mx-auto flex items-center gap-3 pt-2 text-slate-600">
          <div class="relative">
            <input class="h-10 rounded-full border border-rose-100 bg-white px-5 pr-16 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-rose-200"
              type="text" name="q" placeholder="Search">
            <button type="submit" class="absolute right-0 top-0 mt-3 mr-4">
              <svg class="h-4 w-4 fill-current text-slate-500" xmlns="http://www.w3.org/2000/svg"
                xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" id="Capa_1" x="0px" y="0px"
                viewBox="0 0 56.966 56.966" style="enable-background:new 0 0 56.966 56.966;" xml:space="preserve"
                width="512px" height="512px">
                <path
                  d="M55.146,51.887L41.588,37.786c3.486-4.144,5.396-9.358,5.396-14.786c0-12.682-10.318-23-23-23s-23,10.318-23,23  s10.318,23,23,23c4.761,0,9.298-1.436,13.177-4.162l13.661,14.208c0.571,0.593,1.339,0.92,2.162,0.92  c0.779,0,1.518-0.297,2.079-0.837C56.255,54.982,56.293,53.08,55.146,51.887z M23.984,6c9.374,0,17,7.626,17,17s-7.626,17-17,17  s-17-7.626-17-17S14.61,6,23.984,6z" />
              </svg>
            </button>
          </div>
          <a href="{% url 'resource_admin_login' %}" class="rounded-full border border-rose-200 bg-rose-50 px-4 py-2 text-sm font-medium text-rose-700 transition hover:bg-rose-100">
            Login
          </a>
        </div>
      </form>
    </div>
  
    
    </header>
