{% extends 'base.html' %}

{% block content %}

<section class="bg-gradient-to-b from-rose-50 to-stone-50 text-slate-600 body-font">
    <div class="container px-5 py-24 mx-auto">
      
      <div class="flex flex-wrap w-full mb-20">
        <div class="lg:w-1/2 w-full mb-6 lg:mb-0">
          <h1 class="sm:text-3xl text-2xl font-medium title-font mb-2 text-slate-900">
            All Posts</h1>
          <div class="h-1 w-20 bg-rose-300 rounded"></div>
        </div>
      </div>
      
      <div class="flex flex-wrap -m-4">
       {% for post in posts %}  
        <div class="xl:w-1/4 md:w-1/2 p-4">
          <div class="rounded-2xl border border-rose-100 bg-white/90 p-6 shadow-sm shadow-rose-100/40">
            <img class="h-40 rounded w-full object-cover object-center mb-6" src="{{ post.thumbnail.url }}" alt="content">
            <h3 class="tracking-widest text-rose-400 text-xs font-medium title-font">
              Blog post</h3>
            <a href="{% url 'post' post.slug %}" h2 class="text-lg text-slate-900 font-medium title-font mb-4">
              {{ post.title }}</a>
            <p class="leading-relaxed text-base">
              {{ post.overview }}</p>
          </div>
        </div>
       {% endfor %}
     
      </div>
    </div>
</section>
{% endblock content %}
