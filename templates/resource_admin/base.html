<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>{% block title %}Resource Manager{% endblock title %}</title>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-800">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
        <div>
          <a href="{% url 'resource_admin_dashboard' %}" class="text-2xl font-semibold text-slate-900">Resource Manager</a>
          <p class="text-sm text-slate-500">Manage links for Japanese, SRC Game, and Travel</p>
        </div>
        <nav class="flex items-center gap-3 text-sm">
          <a href="{% url 'resource_admin_dashboard' %}" class="rounded-full border border-slate-300 px-4 py-2 hover:bg-slate-50">Dashboard</a>
          <a href="{% url 'resource_admin_database' %}" class="rounded-full border border-slate-300 px-4 py-2 hover:bg-slate-50">Database</a>
          <a href="{% url 'resource_library' %}" class="rounded-full border border-slate-300 px-4 py-2 hover:bg-slate-50">Public page</a>
          {% if request.user.is_authenticated %}
          <form action="{% url 'resource_admin_logout' %}" method="post">
            {% csrf_token %}
            <button type="submit" class="rounded-full bg-slate-900 px-4 py-2 text-white hover:bg-slate-700">Logout</button>
          </form>
          {% endif %}
        </nav>
      </div>
    </header>

    {% if messages %}
    <div class="mx-auto mt-6 max-w-7xl px-6">
      {% for message in messages %}
      <div class="mb-3 rounded-2xl border border-emerald-200 bg-emerald-50 px-5 py-4 text-sm text-emerald-700">
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <main class="mx-auto max-w-7xl px-6 py-10">
      {% block content %}{% endblock content %}
    </main>
  </body>
</html>
